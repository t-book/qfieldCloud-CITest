name: Test

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - master
      - release
  pull_request:

jobs:
  # 1. LINT: Code-Qualität zuerst prüfen
  lint:
    if: '! github.event.pull_request.draft'
    name: Lint code base
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Pre-commit
        env:
          SKIP: no-commit-to-branch
        uses: pre-commit/action@v3.0.1

  # 2. TEST: Nur ausführen, wenn Lint erfolgreich war
  test:
    needs: lint
    name: Run tests (${{ matrix.django_app }} | ${{ matrix.storage }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        django_app:
          - authentication
          - notifs
          - subscription
          - core
          - filestorage
          - __flaky__
        storage:
          - default
          - legacy_storage
    
    # Zentrale Umgebungsvariablen definieren
    env:
      ENVIRONMENT: test
      COMPOSE_FILE: docker-compose.yml:docker-compose.override.test.yml
      STORAGES_PROJECT_DEFAULT_STORAGE: ${{ matrix.storage }}
      # Die JSON-Struktur sauber als Multiline-String hinterlegen
      STORAGES: >-
        {
          "legacy_storage": {
            "BACKEND": "qfieldcloud.filestorage.backend.QfcS3Boto3Storage",
            "OPTIONS": {
              "access_key": "rustfsadmin",
              "secret_key": "rustfsadmin",
              "bucket_name": "qfieldcloud-local-legacy",
              "region_name": "",
              "endpoint_url": "http://172.17.0.1:8009"
            },
            "QFC_IS_LEGACY": true
          },
          "webdav": {
            "BACKEND": "qfieldcloud.filestorage.backend.QfcWebDavStorage",
            "OPTIONS": {
              "webdav_url": "http://qfc_webdav_user:qfc_webdav_pwd@webdav",
              "public_url": "http://webdav",
              "basic_auth": "qfc_webdav_user:qfc_webdav_pwd"
            },
            "QFC_IS_LEGACY": false
          },
          "default": {
            "BACKEND": "qfieldcloud.filestorage.backend.QfcS3Boto3Storage",
            "OPTIONS": {
              "access_key": "rustfsadmin",
              "secret_key": "rustfsadmin",
              "bucket_name": "qfieldcloud-local",
              "region_name": "",
              "endpoint_url": "http://172.17.0.1:8009"
            },
            "QFC_IS_LEGACY": false
          }
        }

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # Docker Buildx einrichten für besseres Caching
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Das Image bauen und den GitHub Actions Cache nutzen
      - name: Build Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true # Image für lokale Docker-Befehle verfügbar machen
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Prepare Environment
        run: |
          cp .env.example .env
          # Wir nutzen die env-Variablen von oben direkt in Docker Compose
          # Es ist nicht mehr nötig, alles mühsam in die .env zu schreiben

      - name: Pull & Up
        run: |
          docker compose pull --ignore-pull-failures
          docker compose up -d

      - name: Initial Django setup
        run: |
          docker compose run --rm app python manage.py makemigrations --no-input --check
          docker compose run --rm app python manage.py migrate
          docker compose run --rm app python manage.py collectstatic --no-input

      - name: Run mandatory tests
        if: matrix.django_app != '__flaky__'
        run: |
          docker compose run --rm app python manage.py test --keepdb -v2 --exclude-tag="flaky" qfieldcloud.${{ matrix.django_app }}

      - name: Run flaky tests
        if: matrix.django_app == '__flaky__'
        # Hier erlauben wir Fehlschläge nur für diesen Step, falls gewünscht
        continue-on-error: true
        run: |
          docker compose run --rm app python manage.py test --keepdb -v2 --tag="flaky" qfieldcloud

      - name: Run Object Storage Cleaner tests
        if: matrix.django_app == 'filestorage' && matrix.storage == 'default'
        run: |
          docker compose run --rm \
            -e AWS_ACCESS_KEY_ID=rustfsadmin \
            -e AWS_SECRET_ACCESS_KEY=rustfsadmin \
            -e AWS_ENDPOINT_URL=http://172.17.0.1:8009 \
            -v ${{ github.workspace }}/scripts:/usr/src/scripts \
            app python /usr/src/scripts/object_storage_cleaner/test.py

      - name: Show logs on failure
        if: failure()
        run: docker compose logs --tail=100

      - name: Post Google Chat message on failure
        if: failure() && matrix.django_app != '__flaky__'
        uses: julb/action-post-googlechat-message@v1
        with:
          message: |
            ❌ Failed job: `${{ matrix.django_app }}` (${{ matrix.storage }})
            Branch: `${{ github.head_ref || github.ref_name }}`
            Check: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          gchat_webhook_url: ${{ secrets.GOOGLE_CHAT_WEBHOOK_URL }}
